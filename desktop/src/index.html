<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Strava Analyzer</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0f1117; color: #e1e4e8; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader { text-align: center; }
        .spinner { width: 36px; height: 36px; border: 3px solid #30363d; border-top: 3px solid #58a6ff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 1.3rem; margin-bottom: 8px; }
        p { color: #8b949e; }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h1>🚴 Strava Analyzer</h1>
        <p>Iniciando servidor...</p>
    </div>
</body>
</html>
