<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strava Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #30363d;
            border-top: 3px solid #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { font-size: 1.3rem; margin-bottom: 8px; }
        p { color: #8b949e; font-size: 0.9rem; }
        .error { color: #f85149; display: none; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h1>🚴 Strava Analyzer</h1>
        <p id="status">Iniciando servidor...</p>
        <p class="error" id="error">No se pudo conectar al servidor. Reinicia la app.</p>
    </div>
    <script>
        // Wait for the Python server to be ready, then redirect
        let attempts = 0;
        const maxAttempts = 30;

        async function checkServer() {
            try {
                const res = await fetch('http://localhost:8050/');
                if (res.ok) {
                    window.location.href = 'http://localhost:8050/';
                    return;
                }
            } catch (e) {
                // Server not ready yet
            }

            attempts++;
            if (attempts >= maxAttempts) {
                document.getElementById('status').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.querySelector('.spinner').style.display = 'none';
                return;
            }

            document.getElementById('status').textContent = `Iniciando servidor... (${attempts}s)`;
            setTimeout(checkServer, 1000);
        }

        checkServer();
    </script>
</body>
</html>
